name: Build Android

on:
  push:
    branches: [main, gh-pages]
    paths:
      - 'android/**'
      - 'index.html'
      - 'icons/**'
      - 'manifest.json'
      - 'sw.js'
      - 'favicon.svg'
      - '.github/workflows/build-android.yml'
  pull_request:
    branches: [main]
    paths:
      - 'android/**'
      - 'index.html'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Sync web assets into Android project
        run: |
          cp index.html android/app/src/main/assets/
          cp favicon.svg android/app/src/main/assets/
          cp manifest.json android/app/src/main/assets/
          cp sw.js android/app/src/main/assets/
          cp icons/* android/app/src/main/assets/icons/

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Build release APK
        working-directory: android
        run: ./gradlew assembleRelease

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: octile-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: octile-release-apk
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 90
