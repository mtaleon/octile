name: Build Android

on:
  push:
    branches: [main, gh-pages]
    paths:
      - 'android/**'
      - 'index.html'
      - 'config.json'
      - 'icons/**'
      - 'manifest.json'
      - 'sw.js'
      - 'favicon.svg'
      - '.github/workflows/build-android.yml'
  pull_request:
    branches: [main]
    paths:
      - 'android/**'
      - 'index.html'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Inject config from environment
        env:
          WORKER_URL: ${{ vars.WORKER_URL }}
        run: |
          if [ -n "$WORKER_URL" ]; then
            python3 -c "
          import json, os
          with open('config.json') as f: cfg = json.load(f)
          v = os.environ.get('WORKER_URL','')
          if v: cfg['WORKER_URL'] = v
          with open('config.json','w') as f: json.dump(cfg, f, indent=2)
          print('config.json:', json.dumps(cfg))
          "
          fi

      - name: Sync web assets into Android project
        run: |
          cp index.html android/app/src/main/assets/
          cp config.json android/app/src/main/assets/
          cp favicon.svg android/app/src/main/assets/
          cp manifest.json android/app/src/main/assets/
          cp sw.js android/app/src/main/assets/
          cp icons/* android/app/src/main/assets/icons/

      - name: Decode release keystore
        if: env.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 -d > android/app/octile-release.keystore

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Build release APK
        working-directory: android
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: ./gradlew assembleRelease

      - name: Build release AAB (for Play Store)
        working-directory: android
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: ./gradlew bundleRelease

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: octile-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: octile-release-apk
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 90

      - name: Upload release AAB
        uses: actions/upload-artifact@v4
        with:
          name: octile-release-aab
          path: android/app/build/outputs/bundle/release/*.aab
          retention-days: 90

      - name: Get version info
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        id: version
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "tag=android-build-${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "name=Android Build ${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: Create Release with APK
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.name }}
          body: |
            Android APK build from commit ${{ github.sha }}

            Download the APK below and install on your Android device.
          files: android/app/build/outputs/apk/debug/*.apk
