name: Build iOS

on:
  push:
    branches: [main, gh-pages]
    paths:
      - 'ios/**'
      - 'index.html'
      - 'config.json'
      - 'icons/**'
      - 'manifest.json'
      - 'sw.js'
      - 'favicon.svg'
      - '.github/workflows/build-ios.yml'
  pull_request:
    branches: [main]
    paths:
      - 'ios/**'
      - 'index.html'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    environment: github-pages

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Inject config from environment
        env:
          WORKER_URL: ${{ vars.WORKER_URL }}
        run: |
          if [ -n "$WORKER_URL" ]; then
            python3 -c "
          import json, os
          with open('config.json') as f: cfg = json.load(f)
          v = os.environ.get('WORKER_URL','')
          if v: cfg['WORKER_URL'] = v
          with open('config.json','w') as f: json.dump(cfg, f, indent=2)
          print('config.json:', json.dumps(cfg))
          "
          fi

      - name: Sync web assets into iOS project
        run: |
          cp index.html ios/Octile/Octile/Web/
          cp config.json ios/Octile/Octile/Web/
          cp favicon.svg ios/Octile/Octile/Web/
          cp manifest.json ios/Octile/Octile/Web/
          cp sw.js ios/Octile/Octile/Web/
          cp icons/* ios/Octile/Octile/Web/icons/

      - name: Select Xcode
        run: |
          # Use the latest available Xcode 15.x on the runner
          XCODE_PATH=$(ls -d /Applications/Xcode_15*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$XCODE_PATH" ]; then
            XCODE_PATH=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          fi
          echo "Using: $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
          xcodebuild -version

      - name: Build for iOS Simulator
        working-directory: ios/Octile
        run: |
          xcodebuild \
            -project Octile.xcodeproj \
            -scheme Octile \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Release \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_ALLOWED=NO \
            build \
            | tail -20

      - name: Archive for distribution
        working-directory: ios/Octile
        run: |
          xcodebuild \
            -project Octile.xcodeproj \
            -scheme Octile \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/Octile.xcarchive" \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_ALLOWED=NO \
            archive \
            | tail -20

      - name: Upload Xcode archive
        uses: actions/upload-artifact@v4
        with:
          name: octile-ios-archive
          path: ${{ runner.temp }}/Octile.xcarchive
          retention-days: 90
