name: Build iOS

on:
  push:
    branches: [main, gh-pages]
    paths:
      - 'ios/**'
      - 'src/**'
      - 'scripts/**'
      - '.github/workflows/build-ios.yml'
  pull_request:
    branches: [main]
    paths:
      - 'ios/**'
      - 'src/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    environment: github-pages

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build web bundle
        run: ./scripts/build.sh

      - name: Sync web assets into iOS project
        run: ./ios/sync-web.sh

      - name: Select Xcode
        run: |
          # Auto-pick the latest available Xcode on the runner
          XCODE_PATH=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          echo "Using: $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
          xcodebuild -version

      - name: Build for iOS Simulator
        working-directory: ios/Octile
        run: |
          xcodebuild \
            -project Octile.xcodeproj \
            -scheme Octile \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Release \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_ALLOWED=NO \
            build \
            | tail -20

      - name: Archive for distribution
        working-directory: ios/Octile
        run: |
          xcodebuild \
            -project Octile.xcodeproj \
            -scheme Octile \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/Octile.xcarchive" \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_ALLOWED=NO \
            archive \
            | tail -20

      - name: Upload Xcode archive
        uses: actions/upload-artifact@v5
        with:
          name: octile-ios-archive
          path: ${{ runner.temp }}/Octile.xcarchive
          retention-days: 90
