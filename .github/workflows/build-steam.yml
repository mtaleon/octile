name: Build Steam

on:
  push:
    branches: [main]
    paths:
      - 'electron/**'
      - 'src/**'
      - 'scripts/**'
      - '.github/workflows/build-steam.yml'
  workflow_dispatch:

concurrency:
  group: steam-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build web bundle
        run: ./scripts/build.sh
        shell: bash

      - name: Install Electron dependencies
        working-directory: electron
        run: npm ci

      - name: Build Electron variants
        run: ./scripts/build-electron.sh all
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Demo artifacts
        uses: actions/upload-artifact@v5
        with:
          name: octile-demo-mac
          path: electron/dist/Octile-Demo-*.dmg
          retention-days: 90
          if-no-files-found: error

      - name: Upload D1 artifacts
        uses: actions/upload-artifact@v5
        with:
          name: octile-d1-mac
          path: electron/dist/Octile-D1-*.dmg
          retention-days: 90
          if-no-files-found: error

      - name: Upload Pure artifacts
        uses: actions/upload-artifact@v5
        with:
          name: octile-pure-mac
          path: electron/dist/Octile-Pure-*.dmg
          retention-days: 90
          if-no-files-found: error
