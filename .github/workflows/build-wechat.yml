name: Build WeChat Mini Game

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        default: 'preview'
        type: choice
        options:
          - preview
          - upload
      version:
        description: 'Version number'
        required: true
        default: '1.0.0'
      desc:
        description: 'Version description'
        required: false
        default: ''

concurrency:
  group: wechat-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test Core Logic
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install core dependencies
        working-directory: octile-core
        run: npm ci

      - name: Run core tests
        working-directory: octile-core
        run: npm test

  preview:
    name: Preview WeChat Mini Game
    runs-on: ubuntu-latest
    needs: test
    if: github.event.inputs.action == 'preview'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install miniprogram-ci
        working-directory: octile-wechatgame
        run: npm ci

      - name: Upload preview
        working-directory: octile-wechatgame
        env:
          WECHAT_APPID: ${{ secrets.WECHAT_APPID }}
          WECHAT_PRIVATE_KEY_BASE64: ${{ secrets.WECHAT_PRIVATE_KEY_BASE64 }}
          VERSION: ${{ github.event.inputs.version }}
          DESC: ${{ github.event.inputs.desc }}
        run: npm run preview

      - name: Upload QR code artifact
        uses: actions/upload-artifact@v4
        with:
          name: wechat-preview-qrcode-${{ github.run_number }}
          path: octile-wechatgame/preview-qrcode.jpg
          retention-days: 7

  upload:
    name: Upload for Review
    runs-on: ubuntu-latest
    needs: test
    if: github.event.inputs.action == 'upload'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install miniprogram-ci
        working-directory: octile-wechatgame
        run: npm ci

      - name: Upload for review
        working-directory: octile-wechatgame
        env:
          WECHAT_APPID: ${{ secrets.WECHAT_APPID }}
          WECHAT_PRIVATE_KEY_BASE64: ${{ secrets.WECHAT_PRIVATE_KEY_BASE64 }}
          VERSION: ${{ github.event.inputs.version }}
          DESC: ${{ github.event.inputs.desc }}
        run: npm run upload
