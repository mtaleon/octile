name: Deploy to GitLab Pages

on:
  push:
    branches: [main]
    paths-ignore:
      - 'android/**'
      - 'ios/**'
      - 'docs/**'
      - '*.md'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Build web bundle
        run: ./scripts/build.sh

      - name: Verify bundle
        run: ./scripts/verify-bundle.sh

      - name: Prepare deploy directory
        run: |
          mkdir -p _deploy/public
          cp -r dist/web/* _deploy/public/
          cp -r ota _deploy/public/ota 2>/dev/null || true
          # GitLab Pages needs this CI config to deploy the public/ folder
          printf 'pages:\n  stage: deploy\n  script:\n    - echo "Deploying"\n  artifacts:\n    paths:\n      - public\n' > _deploy/.gitlab-ci.yml

      - name: Push to GitLab
        env:
          GITLAB_TOKEN: ${{ secrets.GITLAB_DEPLOY_TOKEN }}
          GITLAB_REPO: ${{ secrets.GITLAB_REPO_URL }}
        run: |
          cd _deploy
          git init
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add -A
          git commit -m "Deploy from GitHub $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push --force "https://github-actions-deploy:${GITLAB_TOKEN}@${GITLAB_REPO}" HEAD:main

      - name: Deploy to GitHub Pages (gh-pages branch)
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.GH_PAGES_TOKEN }}
          publish_dir: ./dist/web
          publish_branch: gh-pages
          force_orphan: true
