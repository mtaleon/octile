name: Deploy to GitLab Pages

on:
  push:
    branches: [main]
    paths-ignore:
      - 'android/**'
      - 'ios/**'
      - 'docs/**'
      - '*.md'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Build app.js from src/
        run: |
          cat src/*.js > app.js
          npx terser app.js -o app.min.js --compress --mangle

      - name: Prepare deploy directory
        run: |
          mkdir -p _deploy/public
          # Web assets into public/ — GitLab Pages serves from this folder
          cp index.html app.min.js style.css themes.css translations.json \
             config.json manifest.json sw.js favicon.svg \
             privacy.html terms.html help.html feedback.html \
             version.json _deploy/public/
          cp -r icons _deploy/public/icons
          cp -r ota _deploy/public/ota 2>/dev/null || true
          # GitLab Pages needs this CI config to deploy the public/ folder
          printf 'pages:\n  stage: deploy\n  script:\n    - echo "Deploying"\n  artifacts:\n    paths:\n      - public\n' > _deploy/.gitlab-ci.yml

      - name: Push to GitLab
        env:
          GITLAB_TOKEN: ${{ secrets.GITLAB_DEPLOY_TOKEN }}
          GITLAB_REPO: ${{ secrets.GITLAB_REPO_URL }}
        run: |
          cd _deploy
          git init
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add -A
          git commit -m "Deploy from GitHub $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push --force "https://github-actions-deploy:${GITLAB_TOKEN}@${GITLAB_REPO}" HEAD:main

      - name: Deploy to GitHub Pages (gh-pages branch)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_deploy/public
          publish_branch: gh-pages
          force_orphan: true
